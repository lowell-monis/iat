<html>
    <head>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/minnojs/minno-quest@0.3/dist/main.css" />
        <style type="text/css">
            .container {padding-top: 15px;}
            img {
                -webkit-user-drag: none;
                user-drag: none;
                pointer-events: none;
            }
        </style>

        <script>
            var scriptTag = document.createElement('script');
            scriptTag.src = 'https://cdn.jsdelivr.net/gh/minnojs/minno-quest@0.3/dist/pi-minno.js';
            scriptTag.onload = onLoad;
            scriptTag.onreadystatechange = onLoad;
            document.head.appendChild(scriptTag);

            function onLoad() {
                var container = document.createElement('div');
                container.className = 'container';

                var canvas = document.createElement('div');
                container.appendChild(canvas);
                document.body.appendChild(container);

                minnoJS(canvas, 'mgr.js');

                minnoJS.onEnd = function(data) {
                    var dataAsString = JSON.stringify(data);
                    var sessionId = 'sess_' + Date.now();

                    fetch('https://pipe.jspsych.org/api/data/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': '*/*'
                        },
                        body: JSON.stringify({
                            experimentID: '12MlCB7eHnjP',
                            filename: sessionId + '.csv',
                            data: dataAsString
                        })
                    })
                    .then(function() {
                        window.location.href = 'https://polisci.msu.edu/';
                    })
                    .catch(function(error) {
                        console.error('DataPipe upload failed:', error);
                        window.location.href = 'https://polisci.msu.edu/';
                    });
                };
            }
        </script>
    </head>
    <body>
    </body>
</html>
