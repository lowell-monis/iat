<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/minnojs/minno-quest@0.3/dist/main.css"/>

    <style>
        .container {
            padding-top: 15px;
        }

        img {
            -webkit-user-drag: none;
            user-drag: none;
            pointer-events: none;
        }

        /* Glyphicon font fallback to clean up 403 warnings */
        @font-face {
            font-family: 'Glyphicons Halflings';
            src: url('https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.4.1/fonts/glyphicons-halflings-regular.eot');
            src: url('https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.4.1/fonts/glyphicons-halflings-regular.eot?#iefix') format('embedded-opentype'),
                 url('https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.4.1/fonts/glyphicons-halflings-regular.woff2') format('woff2'),
                 url('https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.4.1/fonts/glyphicons-halflings-regular.woff') format('woff'),
                 url('https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.4.1/fonts/glyphicons-halflings-regular.ttf') format('truetype');
        }
    </style>

    <script>
        var scriptTag = document.createElement("script");
        scriptTag.src = "https://cdn.jsdelivr.net/gh/minnojs/minno-quest@0.3/dist/pi-minno.js";
        scriptTag.onload = onLoad;
        scriptTag.onreadystatechange = onLoad;
        document.head.appendChild(scriptTag);

        function onLoad() {
            var container = document.createElement("div");
            container.className = "container";

            var canvas = document.createElement("div");
            container.appendChild(canvas);

            document.body.appendChild(container);

            minnoJS(canvas, "mgr.js");
        }
    </script>
</head>
<body>
</body>
</html>
