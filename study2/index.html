<!DOCTYPE html>
<html>
<head>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/minnojs/minno-quest@0.3/dist/main.css"/>

    <style>
        .container{
            padding-top:15px;
        }

        img{
            -webkit-user-drag:none;
            user-drag:none;
            pointer-events:none;
        }
    </style>

    <script>

        var scriptTag = document.createElement("script");
        scriptTag.src = "https://cdn.jsdelivr.net/gh/minnojs/minno-quest@0.3/dist/pi-minno.js";
        scriptTag.onload = onLoad;
        scriptTag.onreadystatechange = onLoad;
        document.head.appendChild(scriptTag);

        function onLoad(){

            var container = document.createElement("div");
            container.className = "container";

            var canvas = document.createElement("div");
            container.appendChild(canvas);

            document.body.appendChild(container);

            minnoJS(canvas,"mgr.js");

            minnoJS.onEnd = async function(data) {
                try {
                    console.log("Raw experiment data:", data);

                    const sessionId = "study2_" + Date.now() + "_" + Math.random().toString(36).substring(2, 8);

                    // Standardize data extraction from MinnoJS
                    let dataAsString = "";
                    
                    if (typeof data === "string") {
                        dataAsString = data;
                    } else if (data && typeof data.getCSV === "function") {
                        // If Minno passes a logger instance with a CSV helper
                        dataAsString = data.getCSV();
                    } else if (Array.isArray(data)) {
                        // If data is an array of trial objects
                        dataAsString = JSON.stringify(data);
                    } else {
                        dataAsString = JSON.stringify(data || {});
                    }

                    const response = await fetch("https://pipe.jspsych.org/api/data/", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Accept": "*/*"
                        },
                        body: JSON.stringify({
                            experimentID: "KQ2pq6uCiqYL",
                            filename: sessionId + ".csv",
                            data: dataAsString
                        })
                    });

                    if (!response.ok) {
                        throw new Error(await response.text());
                    }

                    console.log("Data successfully uploaded.");
                    window.location.replace("https://polisci.msu.edu/");

                } catch (error) {
                    console.error("DataPipe Error:", error);
                    alert("There was a problem saving your responses. Please contact the researcher.");
                }
            };
        }

    </script>

</head>

<body>

</body>
</html>
